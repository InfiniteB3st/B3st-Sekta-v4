<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B3st Sekta</title>
  </head>
  <body>
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        window._sekta_errors = window._sekta_errors || [];
        const originalError = console.error;
        console.error = function() {
          window._sekta_errors.push({
            msg: Array.from(arguments).join(' '),
            time: new Date().toISOString()
          });
          originalError.apply(console, arguments);
        };
        window.addEventListener('error', (e) => {
          window._sekta_errors.push({
            msg: e.message,
            time: new Date().toISOString()
          });
        });

        // KERNEL PERSISTENCE: window.getSystemStats
        window.getSystemStats = () => {
          return {
            url: window.location.href,
            origin: window.location.origin,
            tokens: Object.keys(localStorage).filter(k => k.includes('sb-')),
            errors: window._sekta_errors.slice(-5),
            timestamp: new Date().toISOString()
          };
        };

        const pressedKeys = new Set();
        
        function triggerDiagnosis() {
          // MASTER GATE: Signal to React kernel
          window.dispatchEvent(new CustomEvent('toggle-diagnosis'));
        }

        window.addEventListener('keydown', (e) => {
          pressedKeys.add(e.key.toLowerCase());

          // MASTER KERNEL BYPASS: Shift + Q + T
          if (
            pressedKeys.has('shift') && 
            (pressedKeys.has('q') || e.key.toLowerCase() === 'q') && 
            (pressedKeys.has('t') || e.key.toLowerCase() === 't')
          ) {
            e.preventDefault(); 
            e.stopPropagation();
            triggerDiagnosis();
          }
        }, true);
        
        window.addEventListener('keyup', (e) => {
          pressedKeys.delete(e.key.toLowerCase());
        }, true);
        
        window.addEventListener('blur', () => pressedKeys.clear());
      })();
    </script>
  </body>
</html>
