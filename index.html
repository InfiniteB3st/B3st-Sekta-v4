<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B3st Sekta</title>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- SEKTA KERNEL DIAGNOSIS (HARD-WIRED FALLBACK) -->
    <div id="sekta-diagnosis" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100000; color: #ffb100; font-family: 'JetBrains Mono', monospace; padding: 40px; overflow-y: auto;">
      <div style="max-width: 800px; margin: 0 auto;">
         <h1 style="font-size: 32px; font-weight: 900; font-style: italic; text-transform: uppercase;">Kernel Diagnosis <span style="color: white">Standby</span></h1>
         <p style="font-size: 10px; color: #666; letter-spacing: 2px;">RECOVERY_SHELL_ACTIVE // SHIFT+Q+T_BYPASS</p>
         
         <div style="margin-top: 40px; background: #111; border: 1px solid #333; border-radius: 12px; padding: 30px;">
            <h3 style="margin-top: 0; color: white;">System State</h3>
            <pre id="diag-logs" style="font-size: 12px; line-height: 1.6; color: #888;">
Eska Mila: STANDBY
Supabase: INITIALIZING
Handshake: PENDING
            </pre>
         </div>

         <div style="margin-top: 40px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
           <button onclick="window.location.reload()" style="background: #ffb100; color: #000; border: none; padding: 20px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase;">Reboot Kernel</button>
           <button onclick="document.getElementById('sekta-diagnosis').style.display = 'none'" style="background: #222; color: #fff; border: 1px solid #333; padding: 20px; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase;">Close Shell</button>
         </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        window._sekta_errors = window._sekta_errors || [];
        const originalError = console.error;
        console.error = function() {
          window._sekta_errors.push({
            msg: Array.from(arguments).join(' '),
            time: new Date().toISOString()
          });
          originalError.apply(console, arguments);
        };
        window.addEventListener('error', (e) => {
          window._sekta_errors.push({
            msg: e.message,
            time: new Date().toISOString()
          });
        });

        // KERNEL PERSISTENCE: window.getSystemStats
        window.getSystemStats = () => {
          return {
            url: window.location.href,
            origin: window.location.origin,
            tokens: Object.keys(localStorage).filter(k => k.includes('sb-')),
            errors: window._sekta_errors.slice(-5),
            timestamp: new Date().toISOString()
          };
        };

        const pressedKeys = new Set();
        
        function triggerDiagnosis() {
          const developerEmail = "wambuamaxwell696@gmail.com";
          const authorizedEmails = [developerEmail, "infiniteb3st@gmail.com"];
          const userEmail = window._currentUserEmail;
          const isAuthorized = authorizedEmails.includes(userEmail) || window.location.hostname === 'localhost';

          if (isAuthorized) {
            window.dispatchEvent(new CustomEvent('toggle-diagnosis'));
            
            // Hard-wired fallback for when React is dead
            const diag = document.getElementById('sekta-diagnosis');
            if (diag && !document.querySelector('[data-dev-overlay-active]')) {
              diag.style.display = 'block';
              const stats = window.getSystemStats();
              const logs = document.getElementById('diag-logs');
              logs.innerText = `
URL: ${stats.url}
Tokens: ${stats.tokens.length} detected
Errors: ${stats.errors.length} detected
Timestamp: ${stats.timestamp}
              `.trim();
            }
          } else {
            console.warn("Dev Mode Access Denied: Unauthorized User (" + (userEmail || 'GUEST') + ")");
          }
        }

        window.addEventListener('keydown', (e) => {
          pressedKeys.add(e.key.toLowerCase());

          // MASTER KERNEL BYPASS: Shift + Q + T
          if (
            pressedKeys.has('shift') && 
            (pressedKeys.has('q') || e.key.toLowerCase() === 'q') && 
            (pressedKeys.has('t') || e.key.toLowerCase() === 't')
          ) {
            e.preventDefault(); 
            e.stopPropagation();
            triggerDiagnosis();
          }
        }, true);
        
        window.addEventListener('keyup', (e) => {
          pressedKeys.delete(e.key.toLowerCase());
        }, true);
        
        window.addEventListener('blur', () => pressedKeys.clear());
      })();
    </script>
  </body>
</html>
